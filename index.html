<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum - Download</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @keyframes float1 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
  @keyframes float2 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(15px); } }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
  @keyframes dash { to { stroke-dashoffset: 0; } }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0eaf8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    overflow: hidden;
    position: relative;
  }

  /* 量子粒子背景 */
  .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(123,47,242,0.3), transparent 70%);
  }
  .p1 { width: 300px; height: 300px; top: -80px; right: -60px; animation: float1 6s ease-in-out infinite; }
  .p2 { width: 200px; height: 200px; bottom: -40px; left: -40px; animation: float2 8s ease-in-out infinite; }
  .p3 { width: 150px; height: 150px; top: 40%; left: 60%; animation: float1 10s ease-in-out infinite; opacity: 0.5; }

  /* 量子线条 */
  .bg svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .qline {
    stroke: rgba(123,47,242,0.12);
    stroke-width: 1;
    fill: none;
    stroke-dasharray: 800;
    stroke-dashoffset: 800;
    animation: dash 4s linear infinite;
  }
  .qline2 {
    stroke: rgba(123,47,242,0.08);
    stroke-width: 1;
    fill: none;
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    animation: dash 6s linear infinite;
  }

  /* 闪烁小点 */
  .dot {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(123,47,242,0.5);
    animation: pulse 2s ease-in-out infinite;
  }
  .d1 { top: 15%; left: 20%; animation-delay: 0s; }
  .d2 { top: 30%; right: 15%; animation-delay: 0.5s; }
  .d3 { bottom: 25%; left: 35%; animation-delay: 1s; }
  .d4 { top: 60%; right: 30%; animation-delay: 1.5s; }
  .d5 { bottom: 15%; right: 20%; animation-delay: 0.8s; }
  .d6 { top: 45%; left: 10%; animation-delay: 1.2s; }

  .container {
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 1;
  }
  .btn-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .btn {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.2s ease;
    cursor: pointer;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .btn:hover {
    transform: translateY(-1px);
    background: #fff;
    box-shadow: 0 4px 16px rgba(123,47,242,0.1);
  }
  .btn-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-right: 14px;
  }
  .btn-icon svg { width: 20px; height: 20px; }
  .btn-info { flex: 1; }
  .btn-name { font-size: 15px; font-weight: 600; color: #333; }
  .btn-desc { font-size: 11px; color: #aaa; margin-top: 2px; }
  .btn-action {
    font-size: 12px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
    color: #fff;
  }

  .btn-android .btn-icon { background: #E8F5E9; }
  .btn-android .btn-icon svg { fill: #43A047; }
  .btn-android .btn-action { background: #43A047; }

  .btn-ios .btn-icon { background: #F5F5F5; }
  .btn-ios .btn-icon svg { fill: #555; }
  .btn-ios .btn-action { background: #555; }

  .btn-windows .btn-icon { background: #E3F2FD; }
  .btn-windows .btn-icon svg { fill: #1E88E5; }
  .btn-windows .btn-action { background: #1E88E5; }

  .btn-macos .btn-icon { background: #F3E8FF; }
  .btn-macos .btn-icon svg { fill: #7B2FF2; }
  .btn-macos .btn-action { background: #7B2FF2; }

  @media (max-width: 500px) {
    body { padding: 30px 16px; }
  }
</style>
</head>

<script>

      },
      windows: {
        url: "https://github.com/QuantumNodeX/vpn/releases/download/Quantum-latest-exe/Quantum-v5.0.0-100.exe",
        label: "Windows",

        descriptionSuffix: "支持 Win10 及以上",
        action: "下载"
      },
      macos: {
        url: "https://github.com/QuantumNodeX/vpn/releases/download/Quantum-latest-pkg/Quantum-v5.0.0-100.pkg",
        label: "macOS",
        version: "V5.0.0",
        descriptionSuffix: "支持 macOS 11.0+",
        action: "下载"
      }
    };

    function applyDownloadTarget(elementId, targetKey) {
      var element = document.getElementById(elementId);
      var nameElement = document.getElementById(elementId + "-name");
      var descElement = document.getElementById(elementId + "-desc");
      var actionElement = document.getElementById(elementId + "-action");
      var target = platformTargets[targetKey];

      if (!element || !target) {
        return;
      }

      element.href = target.url;

      if (nameElement && target.label) {
        nameElement.textContent = target.label;
      }

      if (descElement) {
        descElement.textContent = target.description || (target.version + " | " + target.descriptionSuffix);
      }

      if (actionElement && target.action) {
        actionElement.textContent = target.action;
      }
    }

    applyDownloadTarget("android-download", "android");
    applyDownloadTarget("ios-web-download", "ios-web");
    applyDownloadTarget("windows-download", "windows");
    applyDownloadTarget("macos-download", "macos");
  })();
</script>
